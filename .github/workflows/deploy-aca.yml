name: Deploy to Azure Container Apps

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-aca
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production-aca

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push images
        run: |
          IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          docker build -t $ACR_NAME.azurecr.io/backend:$IMAGE_TAG  -t $ACR_NAME.azurecr.io/backend:latest  backend/
          docker build -t $ACR_NAME.azurecr.io/frontend:$IMAGE_TAG -t $ACR_NAME.azurecr.io/frontend:latest frontend/
          docker push $ACR_NAME.azurecr.io/backend  --all-tags
          docker push $ACR_NAME.azurecr.io/frontend --all-tags

      - name: Deploy backend
        run: |
          az containerapp update \
            --name backend \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/backend:${{ github.event.workflow_run.head_sha }}

      - name: Deploy frontend
        run: |
          az containerapp update \
            --name frontend \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/frontend:${{ github.event.workflow_run.head_sha }}

      - name: Verify deployment
        run: |
          FRONTEND_FQDN=$(az containerapp show \
            --name frontend \
            --resource-group $RESOURCE_GROUP \
            --query 'properties.configuration.ingress.fqdn' -o tsv)

          echo "Frontend FQDN: https://$FRONTEND_FQDN"

          # Wait for the new revision to be ready
          sleep 10

          # Test the backend API through the frontend proxy
          for i in $(seq 1 12); do
            if curl -sf "https://$FRONTEND_FQDN/api/hello" | grep -q '"message"'; then
              echo "Deployment verified successfully"
              exit 0
            fi
            echo "Waiting for deployment to be ready... ($i/12)"
            sleep 5
          done

          echo "Deployment verification failed"
          exit 1
