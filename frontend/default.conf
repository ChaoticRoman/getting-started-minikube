server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
    }

    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Ms-Client-Principal-Name $http_x_ms_client_principal_name;
        proxy_set_header X-Ms-Client-Principal-Idp $http_x_ms_client_principal_idp;
        proxy_set_header X-Ms-Client-Principal $http_x_ms_client_principal;
    }
}
