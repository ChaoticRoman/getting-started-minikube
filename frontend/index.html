<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello, Cloud</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 80px auto; text-align: center; }
        #response { margin-top: 1em; color: #333; }
        button { padding: 8px 16px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Hello, Cloud</h1>
    <p id="user-info"></p>
    <p>
        This is my exercise in deploying an app to Cloud Platforms.
    </p>
    <p>
        The repository is on <a href="https://github.com/ChaoticRoman/getting-started-minikube/">GitHub</a>.
    </p>
    <button onclick="callBackend()">Call FastAPI Backend</button>
    <p id="response"></p>
    <p id="version" style="margin-top: 2em; font-size: 0.8rem; color: #999;"></p>
    <script>
        async function callBackend() {
            try {
                const res = await fetch("/api/hello");
                const data = await res.json();
                document.getElementById("response").textContent = data.message;
            } catch (err) {
                document.getElementById("response").textContent = "Error: " + err;
            }
        }
        fetch("/.auth/me")
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                if (!data || data.length === 0) {
                    window.location.href = "/login.html";
                    return;
                }
                const principal = data[0];
                const name = principal.user_claims?.find(c => c.typ === "name")?.val
                    || principal.user_id;
                document.getElementById("user-info").innerHTML =
                    "Signed in as " + name + ' · <a href="/.auth/logout">Sign out</a>';
            })
            .catch(() => { window.location.href = "/login.html"; });
        fetch("version.txt", { cache: "no-store" })
            .then(r => r.text())
            .then(v => document.getElementById("version").textContent = "Commit: " + v.trim());
    </script>
</body>
</html>
